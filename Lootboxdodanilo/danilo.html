<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versão Mobile</title>
<link rel="stylesheet" href="danilo.css">
</head>
<body>

  <div id="danilson"> 
      <img id="imagem-dinamica" onclick="nascer()" class="calse" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKDvcSvrL9rs4ANB2dVQq_6ZysHMu1Yu4nQw&s" alt="Imagem Inicial">
  </div>
  
</body>
<script>
  function nascer() { 
    const img = document.getElementById('imagem-dinamica');
    
    // 1. Aplica a animação de sumir na imagem atual
    img.classList.add('apagar');
    
    // 2. Espera a animação de sumir terminar (400ms) para trocar a imagem e fazê-la surgir
    setTimeout(() => {
        img.src = "danilo EM T POSE.png";
        img.classList.remove('apagar'); // Remove o 'apagar' para a nova imagem aparecer
    }, 400);
  }
</script>
</html>
